openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: admin
    description: Admin operations
  - name: profesor
    description: Professor operations
  - name: belts
    description: Belt progression operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
  /admin/users:
    get:
      operationId: adminGetUsers
      tags: [admin]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUsersResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/users/{id}/roles:
    put:
      operationId: adminUpdateRoles
      tags: [admin]
      summary: Update user roles (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRolesRequest"
      responses:
        "200":
          description: Roles updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRolesResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/users/{id}/subscription:
    put:
      operationId: adminUpdateSubscription
      tags: [admin]
      summary: Update user subscription (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubscriptionRequest"
      responses:
        "200":
          description: Subscription updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateSubscriptionResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/profesor/{profesorId}/alumnos:
    get:
      operationId: adminGetProfesorAlumnos
      tags: [admin]
      summary: Get students assigned to a professor (admin only)
      parameters:
        - name: profesorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of assigned student IDs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfesorAlumnoIdsResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: adminUpdateProfesorAlumnos
      tags: [admin]
      summary: Update students assigned to a professor (admin only)
      parameters:
        - name: profesorId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfesorAlumnosRequest"
      responses:
        "200":
          description: Assignments updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateProfesorAlumnosResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Professor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /belts/definitions:
    get:
      operationId: getBeltDefinitions
      tags: [belts]
      summary: Get all belt definitions
      responses:
        "200":
          description: Belt definitions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BeltDefinitionsResponse"
  /belts/me:
    get:
      operationId: getMyBelts
      tags: [belts]
      summary: Get current user belt progression
      responses:
        "200":
          description: User belt data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyBeltsResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/belts/users:
    get:
      operationId: adminGetBeltUsers
      tags: [admin]
      summary: Get all students with belt info (admin only)
      responses:
        "200":
          description: Students with belt info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBeltUsersResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/belts/users/{userId}/history:
    get:
      operationId: adminGetBeltHistory
      tags: [admin]
      summary: Get belt history for a student (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Belt history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBeltHistoryResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/belts/unlock:
    post:
      operationId: adminUnlockBelt
      tags: [admin]
      summary: Unlock next belt level for a student (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BeltActionRequest"
      responses:
        "200":
          description: Belt unlocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BeltUnlockResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/belts/promote:
    post:
      operationId: adminPromoteBelt
      tags: [admin]
      summary: Promote student to next belt (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BeltActionRequest"
      responses:
        "200":
          description: Student promoted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BeltPromoteResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /profesor/alumnos:
    get:
      operationId: profesorGetAlumnos
      tags: [profesor]
      summary: List students (professor only)
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfesorStudentsResponse"
        "403":
          description: Not a professor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        displayName:
          type: string
      required:
        - email
        - password
        - displayName
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password
    UserData:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        subscriptionLevel:
          type: string
          enum: [basico, medio, avanzado, personalizado]
        roles:
          type: array
          items:
            type: string
            enum: [admin, profesor, alumno]
      required:
        - id
        - email
        - displayName
        - subscriptionLevel
        - roles
    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserData"
      required:
        - user
    AdminUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserData"
      required:
        - users
    UpdateRolesRequest:
      type: object
      properties:
        roles:
          type: array
          items:
            type: string
            enum: [admin, profesor, alumno]
      required:
        - roles
    UpdateRolesResponse:
      type: object
      properties:
        success:
          type: boolean
        roles:
          type: array
          items:
            type: string
      required:
        - success
        - roles
    UpdateSubscriptionRequest:
      type: object
      properties:
        subscriptionLevel:
          type: string
          enum: [basico, medio, avanzado, personalizado]
      required:
        - subscriptionLevel
    UpdateSubscriptionResponse:
      type: object
      properties:
        success:
          type: boolean
        subscriptionLevel:
          type: string
      required:
        - success
        - subscriptionLevel
    ProfesorAlumnoIdsResponse:
      type: object
      properties:
        alumnoIds:
          type: array
          items:
            type: integer
      required:
        - alumnoIds
    UpdateProfesorAlumnosRequest:
      type: object
      properties:
        alumnoIds:
          type: array
          items:
            type: integer
      required:
        - alumnoIds
    UpdateProfesorAlumnosResponse:
      type: object
      properties:
        success:
          type: boolean
        alumnoIds:
          type: array
          items:
            type: integer
      required:
        - success
        - alumnoIds
    ProfesorStudentsResponse:
      type: object
      properties:
        students:
          type: array
          items:
            $ref: "#/components/schemas/UserData"
      required:
        - students
    BeltDefinitionData:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
        orderIndex:
          type: integer
        description:
          type: string
          nullable: true
        discipline:
          type: string
          enum: [ninjutsu, jiujitsu]
      required:
        - id
        - name
        - color
        - orderIndex
    BeltDefinitionsResponse:
      type: object
      properties:
        definitions:
          type: array
          items:
            $ref: "#/components/schemas/BeltDefinitionData"
      required:
        - definitions
    BeltRequirementData:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        orderIndex:
          type: integer
      required:
        - id
        - title
        - orderIndex
    MyBeltData:
      type: object
      properties:
        discipline:
          type: string
        currentBelt:
          $ref: "#/components/schemas/BeltDefinitionData"
        nextUnlocked:
          type: boolean
        unlockedAt:
          type: string
          nullable: true
        nextBelt:
          $ref: "#/components/schemas/BeltDefinitionData"
          nullable: true
        nextRequirements:
          type: array
          items:
            $ref: "#/components/schemas/BeltRequirementData"
      required:
        - discipline
        - currentBelt
        - nextUnlocked
        - nextRequirements
    BeltHistoryData:
      type: object
      properties:
        id:
          type: integer
        discipline:
          type: string
        beltId:
          type: integer
        achievedAt:
          type: string
        notes:
          type: string
          nullable: true
        beltName:
          type: string
        beltColor:
          type: string
      required:
        - id
        - discipline
        - beltId
        - achievedAt
        - beltName
        - beltColor
    MyBeltsResponse:
      type: object
      properties:
        belts:
          type: array
          items:
            $ref: "#/components/schemas/MyBeltData"
        history:
          type: array
          items:
            $ref: "#/components/schemas/BeltHistoryData"
      required:
        - belts
        - history
    AdminBeltUserData:
      type: object
      properties:
        id:
          type: integer
        displayName:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
        belts:
          type: array
          items:
            type: object
            properties:
              discipline:
                type: string
              currentBelt:
                $ref: "#/components/schemas/BeltDefinitionData"
              nextUnlocked:
                type: boolean
      required:
        - id
        - displayName
        - email
        - roles
        - belts
    AdminBeltUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/AdminBeltUserData"
      required:
        - users
    AdminBeltHistoryResponse:
      type: object
      properties:
        history:
          type: array
          items:
            $ref: "#/components/schemas/BeltHistoryData"
      required:
        - history
    BeltActionRequest:
      type: object
      properties:
        userId:
          type: integer
        discipline:
          type: string
          enum: [ninjutsu, jiujitsu]
      required:
        - userId
        - discipline
    BeltUnlockResponse:
      type: object
      properties:
        success:
          type: boolean
        nextBelt:
          $ref: "#/components/schemas/BeltDefinitionData"
      required:
        - success
        - nextBelt
    BeltPromoteResponse:
      type: object
      properties:
        success:
          type: boolean
        newBelt:
          $ref: "#/components/schemas/BeltDefinitionData"
      required:
        - success
        - newBelt
