name: Build Desktop (Windows)

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: artifacts/payments-admin-desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust (x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: artifacts/payments-admin-desktop/src-tauri -> target

      - name: Install workspace dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile=false

      - name: Build Tauri app (x64 MSI + NSIS)
        run: pnpm exec tauri build --target x86_64-pc-windows-msvc

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: shinobi-payments-admin-windows-x64
          path: |
            artifacts/payments-admin-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            artifacts/payments-admin-desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30
